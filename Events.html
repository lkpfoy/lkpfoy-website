<div class="calendar-container">
    <div class="calendar-header">
        <button id="prevMonth">&#10094;</button>
        <h2 id="monthYear"></h2>
        <button id="nextMonth">&#10095;</button>
    </div>

    <div class="calendar-weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
    </div>

    <div class="calendar-days" id="calendarDays"></div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {

    const monthYear = document.getElementById('monthYear');
    const calendarDays = document.getElementById('calendarDays');
    const eventInfo = document.getElementById('eventInfo');

    let currentDate = new Date();

    const events = {
        '2026-07-15T18:00:00': {
            title: 'Youth Prayer Service',
            venue: 'LKP Presbytery Hall',
            description: 'An evening of worship and prayer.'
        },

        '2026-07-26T09:00:00': {
            title: 'Choir Festival',
            venue: 'Mamelodi Congregation',
            description: 'Presbytery choir celebration and fellowship.'
        },

        '2026-07-21T18:00:00': {
            title: 'tester',
            venue: '?',
            description: 'Presbytery choir celebration and fellowship.'
        },

        '2026-08-01T09:00:00': {
            title: 'Senate Meeting',
            venue: 'Mamelodi Congregation',
            description: 'Presbytery choir celebration and fellowship.'
        },

        '2026-08-09T10:00:00': {
            title: 'Women\'s Day Celebration',
            venue: 'Pretoria Central',
            description: 'Celebrating the contribution of women in the church.'
        },

        '2026-12-25T09:30:00': {
            title: 'Christmas Service',
            venue: 'Main Sanctuary',
            description: 'Christmas Day worship service.'
        }
    };

    function showEvent(eventDateString) {

    const event = events[eventDateString];
    const eventDate = new Date(eventDateString);

    document.getElementById('eventInfo').innerHTML = `
        <h3>${event.title}</h3>

        <p>
            <strong>Date:</strong>
            ${eventDate.toDateString()}
        </p>

        <p>
            <strong>Time:</strong>
            ${eventDate.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            })}
        </p>

        <p>
            <strong>Venue:</strong>
            ${event.venue}
        </p>

        <p>
            ${event.description}
        </p>
    `;
}

    function renderCalendar() {
    calendarDays.innerHTML = '';

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    monthYear.textContent =
        currentDate.toLocaleString('en-US', {
            month: 'long',
            year: 'numeric'
        });

    const firstDay =
        new Date(year, month, 1).getDay();

    const daysInMonth =
        new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        const blank = document.createElement('div');
        calendarDays.appendChild(blank);
    }

    for (let day = 1; day <= daysInMonth; day++) {

        const cell = document.createElement('div');
        cell.textContent = day;

        const dateString =
            `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

        const today = new Date();

        if (
            day === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear()
        ) {
            cell.classList.add('today');
        }

        const eventKey =
            Object.keys(events).find(
                key => key.startsWith(dateString)
            );

        if (eventKey) {
            cell.classList.add('event');

            cell.addEventListener('click', function () {
                showEvent(eventKey);
            });
        }

        calendarDays.appendChild(cell);
    }
}

    document.getElementById('prevMonth')
        .addEventListener('click', function () {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

    document.getElementById('nextMonth')
        .addEventListener('click', function () {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

    renderCalendar();
});
</script>
<div id="eventInfo" class="event-info">
    <h3>Select an event date</h3>
    <p>Click on a highlighted date to view event details.</p>
</div>
    </body>
