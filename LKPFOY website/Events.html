    <script>
const monthYear = document.getElementById('monthYear');
const calendarDays = document.getElementById('calendarDays');

let currentDate = new Date();

/* Add your event dates here */
const events = {
    '2026-07-15': {
        title: 'Youth Prayer Service',
        venue: 'LKP Presbytery Hall',
        time: '18:00'
    },

    '2026-07-26': {
        title: 'Choir Festival',
        venue: 'Mamelodi Congregation',
        time: '09:00'
    },

    '2026-08-09': {
        title: 'Women\'s Day Celebration',
        venue: 'Pretoria Central',
        time: '10:00'
    },

    '2026-12-25': {
        title: 'Christmas Service',
        venue: 'Main Sanctuary',
        time: '09:30'
    }
};

function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    monthYear.textContent =
        currentDate.toLocaleString('default', {
            month: 'long',
            year: 'numeric'
        });

    calendarDays.innerHTML = '';

    const firstDay =
        new Date(year, month, 1).getDay();

    const lastDate =
        new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        calendarDays.innerHTML += '<div></div>';
    }

    for (let day = 1; day <= lastDate; day++) {
        const cell = document.createElement('div');
        cell.textContent = day;

        const dateString =
            `${year}-${String(month + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

        const today = new Date();

        if (
            day === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear()
        ) {
            cell.classList.add('today');
        }

        if (events[dateString]) {
    cell.classList.add('event');

    cell.addEventListener('click', function () {
        showEvent(dateString);
    });
}

        calendarDays.appendChild(cell);
    }
}

document.getElementById('prevMonth')
.addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
});

document.getElementById('nextMonth')
.addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
});

renderCalendar();
</script>

<div class="calendar-container">
    <div class="calendar-header">
        <button id="prevMonth">&#10094;</button>

    <div class="calendar-days" id="calendarDays"></div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {

    const monthYear = document.getElementById('monthYear');
    const calendarDays = document.getElementById('calendarDays');
    const eventInfo = document.getElementById('eventInfo');

    let currentDate = new Date();

    const events = {
        '2026-07-15': {
            title: 'Youth Prayer Service',
            venue: 'LKP Presbytery Hall',
            time: '18:00',
            description: 'An evening of worship and prayer.'
        },

        '2026-07-26': {
            title: 'Choir Festival',
            venue: 'Mamelodi Congregation',
            time: '09:00',
            description: 'Presbytery choir celebration and fellowship.'
        },

        '2026-08-09': {
            title: 'Women\'s Day Celebration',
            venue: 'Pretoria Central',
            time: '10:00',
            description: 'Celebrating the contribution of women in the church.'
        },

        '2026-12-25': {
            title: 'Christmas Service',
            venue: 'Main Sanctuary',
            time: '09:30',
            description: 'Christmas Day worship service.'
        }
    };

    function showEvent(dateString) {
        const event = events[dateString];

        eventInfo.innerHTML = `
            <h3>${event.title}</h3>
            <p><strong>Date:</strong> ${dateString}</p>
            <p><strong>Time:</strong> ${event.time}</p>
            <p><strong>Venue:</strong> ${event.venue}</p>
            <p>${event.description}</p>
        `;
    }

    function renderCalendar() {
        calendarDays.innerHTML = '';

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        monthYear.textContent =
            currentDate.toLocaleString('en-US', {
                month: 'long',
                year: 'numeric'
            });

        const firstDay =
            new Date(year, month, 1).getDay();

        const daysInMonth =
            new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const blank = document.createElement('div');
            calendarDays.appendChild(blank);
        }

        for (let day = 1; day <= daysInMonth; day++) {

            const cell = document.createElement('div');
            cell.textContent = day;

            const dateString =
                `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

            const today = new Date();

            if (
                day === today.getDate() &&
                month === today.getMonth() &&
                year === today.getFullYear()
            ) {
                cell.classList.add('today');
            }

            if (events[dateString]) {
                cell.classList.add('event');

                cell.addEventListener('click', function () {
                    showEvent(dateString);
                });
            }

            calendarDays.appendChild(cell);
        }
    }

    document.getElementById('prevMonth')
        .addEventListener('click', function () {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

    document.getElementById('nextMonth')
        .addEventListener('click', function () {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

    renderCalendar();
});
</script>
<div id="eventInfo" class="event-info">
    <h3>Select an event date</h3>
    <p>Click on a highlighted date to view event details.</p>
</div>
